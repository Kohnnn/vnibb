name: Reliability Gate

on:
  workflow_dispatch:
  schedule:
    - cron: "15 * * * *"

jobs:
  no-502-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install API dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "apps/api[dev]"

      - name: Preflight Zeabur status codes
        run: |
          set +e
          echo "health: $(curl -s -o /dev/null -w '%{http_code}' https://vnibb.zeabur.app/health/)"
          echo "live: $(curl -s -o /dev/null -w '%{http_code}' https://vnibb.zeabur.app/live)"
          echo "ready: $(curl -s -o /dev/null -w '%{http_code}' https://vnibb.zeabur.app/ready)"
          set -e

      - name: Run core endpoint gate
        working-directory: apps/api
        run: |
          python scripts/widget_health_matrix.py \
            --base-url https://vnibb.zeabur.app \
            --repeats 5 \
            --timeout 10 \
            --fail-on-error \
            --output-json scripts/v34_widget_health_after.json

      - name: Upload reliability artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reliability-gate-${{ github.run_id }}
          path: apps/api/scripts/v34_widget_health_after.json
          if-no-files-found: warn
