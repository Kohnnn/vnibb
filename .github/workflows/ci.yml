name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  ci-gate:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000/api/v1/ws/prices
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile
      - name: Install API dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "apps/api[dev]"
      - name: Run root CI gate
        run: pnpm run ci:gate

  postgres-release-contract:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: vnibb
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d vnibb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/vnibb
      POSTGRES_CONTRACT_DATABASE_URL: postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/vnibb
      POSTGRES_CONTRACT: "1"
      SKIP_SCHEDULER_STARTUP: "1"
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install API dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "apps/api[dev]"
      - name: Apply migrations to an empty PostgreSQL database
        working-directory: apps/api
        run: python -m alembic -c alembic.ini upgrade head
      - name: Run PostgreSQL release contracts
        run: python -m pytest apps/api/tests/test_contract -q

  chromium-release-smoke:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_API_URL: http://127.0.0.1:8000
      NEXT_PUBLIC_WS_URL: ws://127.0.0.1:8000/api/v1/ws/prices
      NEXT_PUBLIC_ENABLE_REALTIME: "false"
      ENVIRONMENT: test
      DATABASE_URL: sqlite+aiosqlite:////tmp/vnibb-release-smoke.db
      DATABASE_URL_SYNC: sqlite+aiosqlite:////tmp/vnibb-release-smoke.db
      REDIS_URL: ""
      REDIS_HOST: ""
      REDIS_PORT: "0"
      MONGODB_ENABLED: "false"
      APPWRITE_WRITE_ENABLED: "false"
      SKIP_SCHEDULER_STARTUP: "1"
      SKIP_WEBSOCKET_STARTUP: "1"
      SKIP_WARMUP: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile
      - name: Install API dependencies for local smoke service
        run: |
          python -m pip install --upgrade pip
          pip install -e "apps/api[dev]"
      - name: Install Chromium
        run: pnpm --filter frontend exec playwright install --with-deps chromium
      - name: Build frontend
        run: pnpm --filter frontend build
      - name: Run Chromium release smoke
        run: pnpm --filter frontend test:e2e:smoke
